<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
    integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./asset/css/style.css">
</head>

<body>

  <!-- ShopEasy Navbar -->
  <div class="bg-seconday">
    <nav class="navbar navbar-expand-lg w-100 position-fixed top-0 bg-secondary">
      <div class="container">
        <a class="navbar-brand fw-bold text-white fs-4" href="#">ShopEasy</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="./cart.html" target="_self">Cart</a>
            </li>
            <li class="nav-item" id="logout-btn">
              <a class="nav-link active" aria-current="page" href="#">Logout</a>
            </li>
            <li class="nav-item" id="login-btn">
              <a class="nav-link active" aria-current="page" href="#" class="btn btn-primary"
              data-bs-target="#exampleModalToggle" data-bs-toggle="modal">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active bg-warning" aria-current="page" href="#" id="username-display"></a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </div>

  <!-- Hero Section -->

  <div class="hero-section text-white text-center">
    <div class="container p-5">
      <h1 class="display-4 p-5">Welcome to ShopEasy</h1>
      <p class="lead">Your one-stop for amazing products</p>
    </div>
  </div>

  <!-- filter section -->

  <section>
    <div class="container py-5">
      <div class="row align-items-center">
        <div class="col input-group border align-items-center rounded">
          <span>
            <i class="bi bi-search"></i>
          </span>
          <input class="form-control border-0" type="text" name="search-input" placeholder="Search Product" value=""
            id="search-input">
        </div>
        <div class="col">
          <select class="form-select" aria-label="Default select example" id="category-filter">
            <option value="all">Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Home">Home</option>
            <option value="Sports">Sports</option>
            <option value="Accessories">Accessories</option>
            <option value="Books">Books</option>
          </select>
        </div>
        <div class="col">
          <select class="form-select" aria-label="Default select example" id="sort-filter">
            <option value="all">Short By</option>
            <option value="price-low">Price : Low to High</option>
            <option value="price-high">Price : High to Low</option>
            <option value="name">Name : A to Z</option>
          </select>
        </div>
      </div>
    </div>
  </section>


  <!-- Product Section -->

  <section>
    <div class="container">
      <h2>Our Products</h2>
      <div class="row " id="products_container"></div>
    </div>
  </section>


  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p class="mb-0">&copy; 2026 ShopEasy. All rights reserved.</p>
      <p class="mb-0">HTML, CSS, Bootstrap & JavaScript</p>
    </div>
  </footer>



  <!-- login and register model -->

  <div class="modal fade" id="exampleModalToggle loginModel" aria-hidden="true" aria-labelledby="exampleModalToggleLabel"
    tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="fs-5 mx-auto my-0" id="exampleModalToggleLabel">Login Form</h1>
          <button type="button" class="btn-close m-0" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label">User Name</label>
            <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Enter username">
          </div>
          <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Password</label>
            <input type="password" class="form-control" id="formGroupExampleInput2" placeholder="Enter password">
          </div>
          <div class="mb-3 w-100">
           <button class="btn btn-primary w-100" id="login_btn" data-bs-target="#exampleModalToggle" data-bs-toggle="modal">Login</button>
         </div>
        </div>
        <div class="modal-footer justify-content-between">
         <div class="mb-3">
          <label for="" class="d-block mb-2">You are not registerd user?</label>
           <button class="btn btn-primary" data-bs-target="#exampleModalToggle2" data-bs-toggle="modal">Register</button>
         </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal fade" id="exampleModalToggle2" aria-hidden="true" aria-labelledby="exampleModalToggleLabel2"
    tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalToggleLabel2">Modal 2</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label">User Name</label>
            <input type="text" class="form-control" id="formGroupExample_Input" placeholder="Enter username">
          </div>
          <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Password</label>
            <input type="password" class="form-control" id="formGroupExample_Input2" placeholder="Enter password">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" data-bs-target="#exampleModalToggle" data-bs-toggle="modal" id="register_btn">Register</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="./js/script.mjs"></script>
  <script type="module" src="./js/products.mjs"></script>
</body>

</html>
